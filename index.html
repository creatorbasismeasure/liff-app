<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2>LINE連携</h2>
  <p id="status">処理中です...</p>
</body>

  <script>
    const LIFF_ID = "2009766970-EY44liaw";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzbtupbaNDdtAfz8OnBBYIpP1dLafnINqdd6_C_LHvHpeLAqsI2citd58j6GLglQWo1/exec";
    const statusEl = document.getElementById("status");
  
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
  
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
  
        const params = new URLSearchParams(window.location.search);
        const mid = params.get("mid");
  
        if (!mid) {
          statusEl.innerText = "受付情報が指定されていません。";
          return;
        }
  
        const profile = await liff.getProfile();
        const lineUserId = profile.userId;
  
        const url =
          GAS_URL +
          "?mid=" + encodeURIComponent(mid) +
          "&lineUserId=" + encodeURIComponent(lineUserId);
  
        const res = await fetch(url);
        const data = await res.json();
  
        if (data.status === "success") {
          statusEl.innerText = "LINE連携が完了しました。";
        
          setTimeout(() => {
            liff.closeWindow();
          }, 3000);
        
        } else if (data.status === "already_linked") {
          statusEl.innerText = "この受付情報はすでにLINE連携済みです。";
        } else if (data.status === "duplicate") {
          statusEl.innerText = "このLINEアカウントはすでに別の受付情報に連携されています。";
        } else if (data.status === "not_found") {
          statusEl.innerText = "受付情報が見つかりませんでした。";
        } else if (data.status === "invalid_request") {
          statusEl.innerText = "必要な情報が不足しています。";
        } else {
          statusEl.innerText = "不明な応答です。";
        }
  
      } catch (err) {
        console.error(err);
        statusEl.innerText = "エラーが発生しました。";
      }
    }
  
    main();
  </script>
</body>
</html>
