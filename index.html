<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2>LINE連携</h2>
  <p id="status">処理中です...</p>

  <script>
    const LIFF_ID = "2009766970-EY44liaw";

    // ここは、GASTEST01で成功したURLの「/exec」までにしてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwaGunN61BWCfGJf7HKH9fVYtkzKhxVEc1jX0ukhzXGdbTU76Nn1-1yR4nqBuPHDXhx/exec";

    const statusEl = document.getElementById("status");

    function getMidFromUrlOrStorage() {
      const params = new URLSearchParams(window.location.search);

      const midFromUrl = params.get("mid");
      if (midFromUrl) {
        sessionStorage.setItem("measurementId", midFromUrl);
        return midFromUrl;
      }

      const liffState = params.get("liff.state");
      if (liffState) {
        const decodedState = decodeURIComponent(liffState);
        const stateParams = new URLSearchParams(
          decodedState.startsWith("?") ? decodedState.substring(1) : decodedState
        );

        const midFromState = stateParams.get("mid");
        if (midFromState) {
          sessionStorage.setItem("measurementId", midFromState);
          return midFromState;
        }
      }

      return sessionStorage.getItem("measurementId");
    }

    async function main() {
      try {
        statusEl.innerText = "STEP 1: mid確認中...";

        const mid = getMidFromUrlOrStorage();

        if (!mid) {
          statusEl.innerText =
            "受付情報が指定されていません。\n\n" +
            "現在のURL: " + window.location.href;
          return;
        }

        statusEl.innerText = "STEP 2: LIFF初期化中...\nmid=" + mid;

        await liff.init({ liffId: LIFF_ID });

        statusEl.innerText = "STEP 3: ログイン状態確認中...";

        if (!liff.isLoggedIn()) {
          statusEl.innerText = "STEP 4: LINEログインへ移動します...";

          const redirectUri =
            window.location.origin +
            window.location.pathname +
            "?mid=" + encodeURIComponent(mid);

          liff.login({ redirectUri: redirectUri });
          return;
        }

        statusEl.innerText = "STEP 5: LINEプロフィール取得中...";

        const profile = await liff.getProfile();
        const lineUserId = profile.userId;

        statusEl.innerText =
          "STEP 6: GASへ送信中...\n" +
          "mid=" + mid + "\n" +
          "lineUserId取得済み";

        const url =
          GAS_URL +
          "?mid=" + encodeURIComponent(mid) +
          "&lineUserId=" + encodeURIComponent(lineUserId);

        const res = await fetch(url);
        const text = await res.text();

        statusEl.innerText =
          "STEP 7: GAS応答受信\n\n" +
          text;

        const data = JSON.parse(text);

        if (data.status === "success") {
          sessionStorage.removeItem("measurementId");
          statusEl.innerText = "LINE連携が完了しました。";

          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            } else {
              statusEl.innerText = "LINE連携が完了しました。画面を閉じてください。";
            }
          }, 3000);

        } else if (data.status === "already_linked") {
          sessionStorage.removeItem("measurementId");
          statusEl.innerText = "この受付情報はすでにLINE連携済みです。";

        } else if (data.status === "duplicate") {
          statusEl.innerText = "このLINEアカウントはすでに別の受付情報に連携されています。";

        } else if (data.status === "not_found") {
          statusEl.innerText = "受付情報が見つかりませんでした。";

        } else if (data.status === "invalid_request") {
          statusEl.innerText =
            "必要な情報が不足しています。\n\n" +
            JSON.stringify(data);

        } else {
          statusEl.innerText =
            "不明な応答です。\n\n" +
            JSON.stringify(data);
        }

      } catch (err) {
        console.error(err);

        statusEl.innerText =
          "エラーが発生しました。\n\n" +
          "message: " + (err && err.message ? err.message : String(err)) + "\n\n" +
          "現在のURL: " + window.location.href;
      }
    }

    main();
  </script>
</body>
</html>
